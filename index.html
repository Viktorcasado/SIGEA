<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f8f9fa">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/pwa/icon-192x192.png">
    <title>SIGEA | IFAL - Sistema Integrado</title>
    <meta name="description" content="Sistema Integrado de Gestão de Eventos Acadêmicos do IFAL">
</head>

<body class="antialiased">
    <div id="root">
        <!-- Loading State for PWA/Web Check -->
        <div id="initial-loader"
            style="position: fixed; inset: 0; background: #eef2f6; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
            <style>
                @media (prefers-color-scheme: dark) {
                    #initial-loader {
                        background: #111927 !important;
                    }
                }

                .spinner {
                    width: 40px;
                    height: 40px;
                    border: 3px solid rgba(0, 0, 0, 0.1);
                    border-top-color: #3b82f6;
                    border-radius: 50%;
                    animation: spin 1s linear infinite;
                }

                @keyframes spin {
                    to {
                        transform: rotate(360deg);
                    }
                }
            </style>
            <div class="spinner"></div>
            <p
                style="margin-top: 20px; font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; color: #64748b;">
                SIGEA INSTITUCIONAL
            </p>
        </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
    <script>
        // iOS detection for PWA install instructions could go here
    </script>
    <!-- Desenvolvido por Viktor Casado -->
</body>

</html>
