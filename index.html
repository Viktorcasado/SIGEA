
<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>SIGEA | IFAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script>
        window.process = { env: { NODE_ENV: 'production', API_KEY: '' } };
        
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#10b981",
                        secondary: "#059669",
                        background: { light: "#f8fafc", dark: "#09090b" },
                        surface: { light: "#ffffff", dark: "#18181b" }
                    },
                    fontFamily: { sans: ["Plus Jakarta Sans", "sans-serif"] },
                    borderRadius: { 
                      '4xl': '2rem', 
                      '5xl': '2.5rem',
                      'apple': '3.2rem'
                    }
                }
            }
        }
    </script>
    
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top, 0px); 
            --safe-bottom: env(safe-area-inset-bottom, 0px); 
        }
        
        * { 
            -webkit-tap-highlight-color: transparent; 
            outline: none !important;
            box-sizing: border-box;
        }
        
        body { 
            background: #f8fafc; 
            color: #0f172a; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark body {
            background: #09090b;
            color: #f8fafc;
        }

        /* Suavização Apple-like para todas as transições de estado */
        .page-transition {
          transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }

        /* Correção e Refinamento de Ícones */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
            user-select: none;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(25px) saturate(180%); 
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 0.5px solid rgba(0,0,0,0.08); 
        }

        .dark .glass {
            background: rgba(24, 24, 27, 0.7); 
            border: 0.5px solid rgba(255,255,255,0.08); 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Esqueleto de carregamento premium */
        .skeleton {
          background: linear-gradient(90deg, #f1f5f9 25%, #f8fafc 50%, #f1f5f9 75%);
          background-size: 200% 100%;
          animation: skeleton-loading 1.5s infinite;
        }
        .dark .skeleton {
          background: linear-gradient(90deg, #18181b 25%, #27272a 50%, #18181b 75%);
          background-size: 200% 100%;
        }
        @keyframes skeleton-loading {
          0% { background-position: 200% 0; }
          100% { background-position: -200% 0; }
        }

        /* Micro-interações de botões */
        .btn-ios-active:active {
          transform: scale(0.96);
          filter: brightness(0.9);
        }
    </style>

    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.48.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>
<body class="antialiased">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
