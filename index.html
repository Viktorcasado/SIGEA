<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIGEA — IFAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #e8f5e9;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-xl: 24px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }
        .container { padding: 0 20px; max-width: 1100px; margin: 0 auto; }

        /* HEADER */
        .top-bar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); padding: 15px 0; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); letter-spacing: -1.5px; text-decoration: none; cursor: pointer; }
        
        .search-container { position: relative; width: 100%; }
        .search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px 16px 12px 42px; border-radius: 14px; font-size: 14px; outline: none; transition: var(--transition); }
        .search-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px var(--primary-light); }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }

        /* BOTTOM NAV */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: var(--surface); 
            border-top: 1px solid var(--border); 
            display: flex; 
            justify-content: space-around; 
            padding: 10px 0 25px 0; 
            z-index: 9999;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.03);
        }
        .nav-item { 
            text-align: center; 
            text-decoration: none; 
            color: var(--text-muted); 
            font-size: 10px; 
            font-weight: 700; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            width: 20%; 
            cursor: pointer; 
            opacity: 0.6;
            transition: var(--transition);
        }
        .nav-icon { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; pointer-events: none; }
        
        /* ESTADO ATIVO */
        .nav-item.is-active { color: var(--primary); opacity: 1; }
        .nav-item.is-active .nav-icon { stroke-width: 3; }

        /* CARDS */
        .card-hero { background: var(--surface); border-radius: var(--radius-xl); overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: var(--transition); margin-top: 20px; }
        .card-hero-img { width: 100%; height: 200px; object-fit: cover; pointer-events: none; }
        .card-content { padding: 20px; pointer-events: none; }
        
        [data-href] { cursor: pointer; user-select: none; }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "jspdf": "https://esm.sh/jspdf@^4.0.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.93.3",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
  }
}
</script>
</head>
<body>

    <header class="top-bar">
        <div class="container">
            <div class="header-main">
                <a href="/sigea/" class="logo">SIGEA</a>
                <a href="/sigea/perfil/" class="nav-item" style="width: auto; opacity: 1;">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
            </div>
            <div class="search-container">
                <span class="search-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></span>
                <input type="text" data-search class="search-input" placeholder="Buscar eventos...">
            </div>
        </div>
    </header>

    <main class="container">
        <h2 style="margin-top: 24px; font-size: 18px; font-weight: 800;">Destaque</h2>
        <article class="card-hero" data-href="/sigea/evento/semint-2026/" data-event-card data-title="SEMINT 2026 Semana de Informática" data-status="aberto" data-type="academico">
            <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=800&q=80" class="card-hero-img">
            <div class="card-content">
                <h3 style="font-size: 18px; font-weight: 800;">SEMINT 2026 — Semana de Informática</h3>
                <p style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Inscrições Abertas • Campus Maceió</p>
            </div>
        </article>
    </main>

    <nav class="bottom-nav">
        <a href="/sigea/" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Início
        </a>
        <a href="/sigea/eventos/" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Eventos
        </a>
        <a href="/sigea/checkin/" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Check-in
        </a>
        <a href="/sigea/certificado/" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
            Certificados
        </a>
        <a href="/sigea/perfil/" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Perfil
        </a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const norm = (p) => {
                if (!p) return "/sigea/";
                let path = p.replace(/\/{2,}/g, "/");
                if (!path.endsWith('/')) path += '/';
                return path;
            };

            const currentPath = norm(window.location.pathname);
            const homePath = '/sigea/';

            document.querySelectorAll('.nav-item[href]').forEach(el => {
                const route = norm(el.getAttribute('href'));
                const isActive = (route === homePath)
                    ? currentPath === homePath
                    : (currentPath.startsWith(route) && route !== homePath);
                
                if (isActive) el.classList.add('is-active');
            });

            document.querySelectorAll('[data-href]').forEach(card => {
                card.addEventListener('click', () => {
                    const to = card.getAttribute('data-href');
                    if (to) window.location.href = to;
                });
            });

            const searchInput = document.querySelector('[data-search]');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('[data-event-card]').forEach(card => {
                        const title = (card.getAttribute('data-title') || "").toLowerCase();
                        card.style.display = title.includes(term) ? '' : 'none';
                    });
                });
            }
        });
    </script>
</body>
</html>
