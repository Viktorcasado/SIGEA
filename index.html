
<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#10b981">
    
    <!-- PWA Primary Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SIGEA">
    
    <!-- Windows Desktop Integration -->
    <meta name="application-name" content="SIGEA | IFAL">
    <meta name="msapplication-TileColor" content="#09090b">
    <meta name="msapplication-config" content="none">
    
    <link rel="icon" type="image/png" href="https://zefvlzfkqsxhzjtwmtmj.supabase.co/storage/v1/object/public/assets/favicon.png">
    <link rel="manifest" href="/manifest.json">
    
    <title>SIGEA | Sistema de Gestão Acadêmica</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script>
        window.process = { env: { NODE_ENV: 'production', API_KEY: '' } };
        
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#10b981",
                        secondary: "#059669",
                        zinc: {
                          950: "#09090b",
                          900: "#121214",
                          800: "#1a1a1e"
                        }
                    },
                    fontFamily: { sans: ["Plus Jakarta Sans", "sans-serif"] },
                    borderRadius: { 
                      'apple': '3.2rem',
                      '4xl': '2rem',
                      '5xl': '2.5rem'
                    }
                }
            }
        }
    </script>
    
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top, 0px); 
            --safe-bottom: env(safe-area-inset-bottom, 0px); 
        }
        
        * { 
            -webkit-tap-highlight-color: transparent; 
            scrollbar-width: thin;
            scrollbar-color: #3f3f46 transparent;
        }

        /* Windows Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        
        body { 
            background: #f8fafc; 
            color: #0f172a; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden;
            padding-bottom: var(--safe-bottom);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .dark body { background: #09090b; color: #f8fafc; }

        /* Android Pull-to-refresh feel */
        body { overscroll-behavior-y: contain; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes scan {
          0% { transform: translateY(0); }
          50% { transform: translateY(240px); }
          100% { transform: translateY(0); }
        }

        @keyframes float {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-10px); }
          100% { transform: translateY(0px); }
        }
        
        .floating { animation: float 6s ease-in-out infinite; }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.90.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "next/": "https://esm.sh/next@^16.1.1/",
    "@supabase/auth-helpers-nextjs": "https://esm.sh/@supabase/auth-helpers-nextjs@^0.15.0"
  }
}
</script>
</head>
<body class="antialiased">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
