<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIGEA - IFAL</title>

    <!-- Proteção contra erro de process.env no navegador -->
    <script>
        window.process = { env: {} };
    </script>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#135bec">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SIGEA">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2907/2907150.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#135bec",
                        "primary-dark": "#0f4bc4",
                        "sigea-green": "#43a047",
                        background: {
                            light: "#f8fafc",
                            dark: "#080c14"
                        },
                        surface: {
                            light: "#ffffff",
                            dark: "#0b101b"
                        }
                    },
                    fontFamily: {
                        sans: ["Public Sans", "sans-serif"]
                    },
                    animation: {
                        'slide-up': 'slideUp 0.3s ease-out',
                        'fade-in': 'fadeIn 0.2s ease-in-out'
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }

        body {
            background-color: #f8fafc;
            color: #0f172a;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .dark body {
            background-color: #080c14;
            color: #f8fafc;
        }

        .nav-pill {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 9999px;
            position: relative;
        }

        .nav-pill:not(.active):hover {
            background-color: rgba(0, 0, 0, 0.03);
        }

        .dark .nav-pill:not(.active):hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Minimalist Active State (No Background) */
        .nav-pill.active {
            transform: translateY(-2px);
        }

        .nav-pill.active span {
            color: #135bec !important;
            font-variation-settings: 'FILL' 1 !important;
            text-shadow: 0 4px 12px rgba(19, 91, 236, 0.4);
        }

        /* FAB Button adjustments */
        .fab-button {
            width: 56px;
            height: 56px;
            border-radius: 9999px;
            background: #135bec;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(19, 91, 236, 0.4);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .dark .fab-button {
            box-shadow: 0 8px 30px rgba(19, 91, 236, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fab-button:active {
            transform: scale(0.92);
        }

        input,
        select,
        textarea {
            border: 2px solid #e2e8f0 !important;
            transition: all 0.2s ease !important;
            font-size: 16px !important;
            /* Prevents auto-zoom on iOS */
        }

        .dark input,
        .dark select,
        .dark textarea {
            border: 2px solid #1e293b !important;
            background-color: #0b101b !important;
        }

        input:focus,
        select:focus {
            border-color: #135bec !important;
            box-shadow: 0 0 0 4px rgba(19, 91, 236, 0.1) !important;
        }

        #root {
            padding-bottom: calc(95px + var(--sab, 0px));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: var(--sat, 0px);
        }

        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
            --sar: env(safe-area-inset-right);
            --sal: env(safe-area-inset-left);
        }

        .fixed-nav-container {
            position: fixed;
            bottom: calc(20px + var(--sab, 0px));
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 26rem;
            z-index: 1000;
            padding: 0 12px;
        }

        .dock-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow:
                0 4px 30px rgba(0, 0, 0, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark .liquid-glass {
            background: rgba(15, 20, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow:
                0 4px 30px rgba(0, 0, 0, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .nav-main {
            flex: 1;
            height: 80px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            padding: 0 8px;
        }

        .nav-profile {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .page-content {
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.34.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.48.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
    <link rel="stylesheet" href="/index.css">
</head>

<body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
