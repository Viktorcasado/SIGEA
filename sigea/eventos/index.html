<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eventos | SIGEA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2e7d32; --bg: #f8fafc; --surface: #ffffff; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --radius-xl: 28px; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding-top: 120px; padding-bottom: 120px; }
        .container { padding: 0 24px; max-width: 800px; margin: 0 auto; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary); letter-spacing: -1px; text-decoration: none; }
        .submenu { position: fixed; top: 70px; left: 0; right: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 14px; overflow-x: auto; scrollbar-width: none; z-index: 999; }
        .submenu::-webkit-scrollbar { display: none; }
        .submenu-container { display: flex; gap: 10px; white-space: nowrap; }
        .submenu-item { display: inline-block; padding: 14px 4px; text-decoration: none; font-size: 14px; font-weight: 700; color: var(--text-muted); border-bottom: 3px solid transparent; transition: all 0.2s ease; }
        .submenu-item.is-active { color: var(--primary); border-bottom-color: var(--primary); }
        .page-header { margin-top: 40px; text-align: center; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        p { color: var(--text-muted); line-height: 1.6; max-width: 500px; margin: 0 auto 30px; }
        .event-list { display: grid; gap: 16px; margin-top: 30px; }
        .event-card { display: block; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-decoration: none; color: inherit; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 25px 0; z-index: 9999; }
        .nav-item { text-align: center; text-decoration: none; color: var(--text-muted); font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 20%; opacity: 0.6; }
        .nav-item.is-active { color: var(--primary); opacity: 1; }
        .nav-icon { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; }
    </style>
</head>
<body>
    <header class="top-bar"><a href="/sigea/" class="logo">SIGEA</a></header>
    <nav class="submenu">
        <div class="submenu-container container">
            <a href="/sigea/eventos/" class="submenu-item">Ver Eventos</a>
            <a href="/sigea/eventos/novo/" class="submenu-item">Novo</a>
            <a href="/sigea/eventos/rascunhos/" class="submenu-item">Rascunhos</a>
            <a href="/sigea/eventos/inscricoes/" class="submenu-item">Inscrições</a>
            <a href="/sigea/eventos/submissoes/" class="submenu-item">Submissões</a>
        </div>
    </nav>
    <main class="container">
        <div class="page-header">
            <h1>Nossos Eventos</h1>
            <p>Explore a lista de eventos acadêmicos, palestras e workshops disponíveis no IFAL.</p>
        </div>
        <div class="event-list">
            <a href="/sigea/evento/semint-2026/" class="event-card"><strong>SEMINT 2026</strong><br><small>Inscrições abertas</small></a>
            <a href="/sigea/evento/feira-ambiental/" class="event-card"><strong>Feira de Ciências Ambientais</strong><br><small>Em breve</small></a>
        </div>
    </main>
    <nav class="bottom-nav">
        <a href="/sigea/" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Início</a>
        <a href="/sigea/eventos/" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>Eventos</a>
        <a href="/sigea/checkin/" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>Check-in</a>
        <a href="/sigea/certificado/" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>Certificados</a>
        <a href="/sigea/perfil/" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>Perfil</a>
    </nav>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const norm = (p) => { let path = (p || '/').replace(/\/{2,}/g, '/'); return path.endsWith('/') ? path : path + '/'; };
            const currentPath = norm(window.location.pathname);
            const homePath = '/sigea/';
            document.querySelectorAll('.nav-item[href]').forEach(el => {
                const route = norm(el.getAttribute('href'));
                const isActive = (route === homePath) ? currentPath === homePath : (currentPath.startsWith(route) && route !== homePath);
                if (isActive) el.classList.add('is-active');
            });
            document.querySelectorAll('.submenu-item[href]').forEach(el => {
                const route = norm(el.getAttribute('href'));
                if (currentPath === route) {
                    el.classList.add('is-active');
                    el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                }
            });
        });
    </script>
</body>
</html>
