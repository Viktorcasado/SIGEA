<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostra de Projetos de Extensão | SIGEA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2e7d32; --bg: #f8fafc; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 24px; }
        .top-bar { background: white; padding: 16px 24px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); text-decoration: none; }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 16px; }
        p { color: var(--text-muted); margin-bottom: 32px; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: var(--primary); font-weight: 700; font-size: 14px; }
    </style>
</head>
<body>
    <header class="top-bar">
        <a href="/sigea/" class="logo">SIGEA</a>
    </header>
    <main class="container">
        <h1>Mostra de Projetos de Extensão</h1>
        <p>Esta página está em construção. Detalhes sobre o evento serão disponibilizados em breve.</p>
        <a href="/sigea/eventos/" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Voltar para Eventos
        </a>
    </main>
</body>
</html>
