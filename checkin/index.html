<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check-in | SIGEA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2e7d32; --bg: #f8fafc; --surface: #ffffff; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --radius-xl: 28px; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding-top: 70px; padding-bottom: 120px; }
        .container { padding: 0 24px; max-width: 500px; margin: 0 auto; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: white; border-bottom: 1px solid var(--border); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary); letter-spacing: -1px; text-decoration: none; }
        
        .card { background: white; border-radius: var(--radius-xl); padding: 32px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.03); margin-top: 30px; text-align: center; }
        .section-title { font-size: 22px; font-weight: 900; margin-bottom: 10px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        .input-field { width: 100%; padding: 18px; border-radius: 16px; border: 2px solid var(--border); font-size: 16px; font-weight: 700; text-align: center; outline: none; }
        
        .btn-confirm { width: 100%; background: var(--primary); color: white; padding: 18px; border-radius: 16px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; margin-bottom: 15px; }
        
        .link-alt { font-size: 13px; color: var(--primary); font-weight: 700; text-decoration: none; display: block; margin-top: 10px; }
        
        #status-card { display: none; margin-top: 20px; padding: 25px; border-radius: 20px; background: #f0fdf4; border: 1px solid #22c55e; color: #166534; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10%); } to { opacity: 1; transform: translateY(0); } }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 25px 0; z-index: 9999; }
        .nav-item { text-align: center; text-decoration: none; color: var(--text-muted); font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 20%; opacity: 0.6; }
        .nav-item.is-active { color: var(--primary); opacity: 1; }
        .nav-icon { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; }
    </style>
</head>
<body>
    <header class="top-bar"><a href="/sigea/" class="logo">SIGEA</a></header>

    <main class="container">
        <div class="card" id="main-card">
            <h2 class="section-title">Check-in</h2>
            <p style="color:var(--text-muted); font-size:14px; margin-bottom:30px;">Confirme sua presença no evento agora.</p>
            
            <div class="input-group">
                <label class="label">CPF ou Código</label>
                <input type="text" id="userInput" class="input-field" placeholder="000.000.000-00">
            </div>
            
            <button class="btn-confirm" onclick="confirmar()">Confirmar Presença</button>
            <a href="/sigea/evento/semint-2026/checkin/" class="link-alt">Check-in da SEMINT 2026 →</a>
        </div>

        <div id="status-card">
            <h3 style="font-size:18px; margin-bottom:10px;">✓ Presença Confirmada!</h3>
            <p style="font-size:14px; margin-bottom:20px;">Sua entrada foi registrada com sucesso. Aproveite o evento!</p>
            <a href="/sigea/evento/semint-2026/certificado/" class="btn-confirm" style="display:block; text-decoration:none; text-align:center;">Ir para Certificado</a>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="/sigea/" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            Início
        </a>
        <a href="/sigea/eventos/" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Eventos
        </a>
        <a href="/sigea/checkin/" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Check-in
        </a>
        <a href="/sigea/certificado/" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
            Certificados
        </a>
        <a href="/sigea/perfil/" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Perfil
        </a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const norm = (p) => {
                if (!p) return "/sigea/";
                let path = p.replace(/\/{2,}/g, "/");
                if (!path.endsWith('/')) path += '/';
                return path;
            };
            const currentPath = norm(window.location.pathname);
            const homePath = '/sigea/';

            document.querySelectorAll('.nav-item[href]').forEach(el => {
                const route = norm(el.getAttribute('href'));
                 const isActive = (route === homePath)
                    ? currentPath === homePath
                    : (currentPath.startsWith(route) && route !== homePath);
                if (isActive) el.classList.add('is-active');
            });
        });

        function confirmar() {
            const val = document.getElementById('userInput').value;
            if(val === '000.000.000-00' || val.toUpperCase() === 'SEMINT123') {
                document.getElementById('main-card').style.display = 'none';
                document.getElementById('status-card').style.display = 'block';
                if(navigator.vibrate) navigator.vibrate([50, 100, 50]);
            } else {
                alert('Inscrição não encontrada. Verifique os dados.');
            }
        }
    </script>
</body>
</html>
