<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrar | SIGEA IFAL</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #e8f5e9;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-lg: 20px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--surface);
            width: 100%;
            max-width: 420px;
            padding: 40px 32px;
            border-radius: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 32px;
            transition: var(--transition);
        }
        .back-link:hover { color: var(--primary); }

        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { font-size: 24px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
        .header p { font-size: 14px; color: var(--text-muted); font-weight: 500; }

        .form-group { margin-bottom: 20px; }
        .label { 
            display: block; 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: var(--text-muted); 
            letter-spacing: 1px; 
            margin-bottom: 8px; 
            margin-left: 4px;
        }
        
        .input-field {
            width: 100%;
            background: var(--bg);
            border: 1.5px solid var(--border);
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }
        .input-field:focus { 
            border-color: var(--primary); 
            background: white; 
            box-shadow: 0 0 0 4px var(--primary-light); 
        }

        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.15);
            transition: var(--transition);
            margin-top: 10px;
        }
        .btn-login:active { transform: scale(0.98); opacity: 0.9; }

        .footer-links {
            display: flex;
            justify-content: center;
            margin-top: 24px;
            gap: 20px;
        }
        .footer-links a {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .footer-links a:hover { opacity: 0.7; }

        .divider {
            height: 1px;
            background: var(--border);
            width: 100%;
            margin: 32px 0 24px;
            position: relative;
        }
        .divider::after {
            content: 'ou';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            padding: 0 10px;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .login-card { border: none; box-shadow: none; background: transparent; padding: 20px 0; }
            body { background-color: var(--surface); }
        }
    </style>
</head>
<body>

    <main class="login-card">
        <a href="/" class="back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Voltar ao Início
        </a>

        <div class="header">
            <h1>Acessar SIGEA</h1>
            <p>Sistema Integrado de Gestão de Eventos</p>
        </div>

        <form onsubmit="event.preventDefault(); alert('Acesso simulado com sucesso.'); window.location.href='/';">
            <div class="form-group">
                <label class="label">E-mail Institucional</label>
                <input type="email" class="input-field" placeholder="exemplo@ifal.edu.br" required autofocus>
            </div>

            <div class="form-group">
                <label class="label">Senha</label>
                <input type="password" class="input-field" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Entrar no Sistema</button>
        </form>

        <div class="footer-links">
            <a href="#">Esqueci minha senha</a>
        </div>

        <div class="divider"></div>

        <div style="text-align: center;">
            <p style="font-size: 13px; color: var(--text-muted); font-weight: 600;">
                Não possui conta? <a href="/cadastro/" style="color: var(--primary); text-decoration: none; font-weight: 800;">Criar Cadastro</a>
            </p>
        </div>
    </main>

</body>
</html>
